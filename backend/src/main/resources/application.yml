# sever port & ssl auth
server:
  port: 8081

# kafka setting
kafka:
  server: kafka uri
  group-id: ssafy
  offset: latest

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: secret
            client-secret: secret
            scope:
              - profile
              - email

          naver:
            client-id: secret
            client-secret: secret
            client-name: Naver
            scope: name,email,profile_image
            authorization-grant-type: authorization_code
            redirect-uri: redirect uri

          kakao:
            client-id: secret
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: kakao
            client-authentication-method: client_secret_post
            redirect-uri: redirect uri

        # Provider 설정
        # 네이버, 카카오는 OAuth2.0 공식 지원대상이 아니라서 provider 설정이 필요
        # 요청주소, 응답 데이터가 다름
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  data:
    mongodb:
      uri: db uri

  # 데이터 소스 설정
  datasource:
    url: jdbc:mysql://localhost:3306/test_db?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: id
    password: pw
    driver-class-name: com.mysql.cj.jdbc.Driver

# jwt secret key 설정
oauth:
  jwt:
    secret: c3ByaW5nYm9vdC1qd3QtdHV0b3JpYWwtc3ByaW5nYm9vdC1qd3QtdHV0b3JpYWwtc3ByaW5nYm9vdC1qd3QtdHV0b3JpYWwK
  authorizedRedirectUri: uri


spring:
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: 844773279085-3c2un0l4fvvg8d75po6uf5p2ecnbkivm.apps.googleusercontent.com
                        client-secret: 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
                        scope:
                            - profile
                            - email

                    naver:
                        client-id: AX2Hx1gI2YQ5WyhQAJdD
                        client-secret: ipY6rw5dB2
                        client-name: Naver
                        scope: name,email,profile_image
                        authorization-grant-type: authorization_code
